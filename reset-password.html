<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body style="background:#f6f1e8;display:flex;justify-content:center;align-items:center;height:100vh;">

<div class="auth-modal" style="display:block;max-width:500px;min-height:auto;">

    <div class="auth-content">

        <h2>Nova senha</h2>

        <p>Digite sua nova senha.</p>

        <form id="reset-form">

            <label>
                Nova senha
                <input
                    type="password"
                    id="password"
                    minlength="6"
                    required>
            </label>

            <label>
                Confirmar senha
                <input
                    type="password"
                    id="confirmPassword"
                    minlength="6"
                    required>
            </label>

            <button class="button full" type="submit">
                Alterar senha
            </button>

        </form>

        <div id="message" style="margin-top:20px;"></div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<script>

const client = window.supabase.createClient(
    window.SUPABASE_URL,
    window.SUPABASE_PUBLISHABLE_KEY
);

document
.getElementById("reset-form")
.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const password=document.getElementById("password").value;
    const confirm=document.getElementById("confirmPassword").value;
    const msg=document.getElementById("message");

    if(password!==confirm){
        msg.innerHTML="As senhas não coincidem.";
        return;
    }

    const {error}=await client.auth.updateUser({
        password:password
    });

    if(error){
        msg.innerHTML=error.message;
    }else{
        msg.innerHTML="Senha alterada com sucesso.<br><br><a href='index.html'>Voltar para o login</a>";
    }

});

</script>

</body>
</html>
